<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unsubscribe Manager</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --border: #2a2a32;
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --text: #f0f0f0;
      --muted: #6b6b7a;
      --danger: #ff4f4f;
      --danger-dim: rgba(255,79,79,0.1);
      --green: #4fffb0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      height: 250px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header .title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #header .meta {
      font-size: 10px;
      color: var(--muted);
    }

    /* CONTROLS */
    #controls {
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      align-items: center;
      flex-shrink: 0;
    }

    #scan-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      outline: none;
    }
    #scan-input:focus { border-color: var(--accent); }

    button {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.03em;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:hover:not(:disabled) { opacity: 0.85; }

    #btn-scan {
      background: var(--accent);
      color: #000;
      white-space: nowrap;
    }

    #btn-clear {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #all-label {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    #all-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 11px;
      height: 11px;
      margin: 0;
      cursor: pointer;
    }

    /* STATUS BAR */
    #status {
      font-size: 10px;
      color: var(--muted);
      padding: 3px 12px;
      background: var(--bg);
      flex-shrink: 0;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    #status.scanning .dot { background: var(--accent); animation: pulse 1s infinite; }
    #status.done .dot { background: var(--green); }
    #status.error .dot { background: var(--danger); }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* PROGRESS */
    #progress-bar {
      height: 2px;
      background: var(--border);
      flex-shrink: 0;
      display: none;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* LIST */
    #list-container {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    #list-container::-webkit-scrollbar { width: 4px; }
    #list-container::-webkit-scrollbar-track { background: transparent; }
    #list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sender-row {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .sender-row:hover { background: var(--surface); }

    .sender-info { flex: 1; min-width: 0; }
    .sender-name {
      font-weight: 600;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .sender-detail {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    .btn-unsub {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(255,79,79,0.3);
      font-size: 10px;
      padding: 3px 8px;
      flex-shrink: 0;
    }
    .btn-unsub.done-unsub {
      background: rgba(79,255,176,0.08);
      color: var(--green);
      border-color: rgba(79,255,176,0.3);
    }
    .btn-unsub:hover:not(:disabled) { opacity: 1; }

    /* EMPTY STATE */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      padding: 12px;
    }
    #empty .icon { font-size: 22px; opacity: 0.5; }
  </style>
</head>
<body>

<div id="header">
  <span class="title">✦ Unsubscribe Manager</span>
  <span class="meta" id="summary-meta"></span>
</div>

<div id="controls">
  <input id="scan-input" type="number" min="10" value="500" placeholder="Anzahl (0 = alle)"/>
  <label id="all-label"><input type="checkbox" id="all-folders"/> Alle Ordner</label>
  <button id="btn-scan">⚡ Scan</button>
  <button id="btn-clear">✕</button>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="status">
  <div class="dot"></div>
  <span id="status-text">Bereit. Anzahl wählen und scannen.</span>
</div>

<div id="list-container">
  <div id="empty">
    <div class="icon">📭</div>
    <div>Noch keine Analyse — klick auf <strong>Scannen</strong></div>
  </div>
</div>

<script src="taskpane.js"></script>
</body>
</html>
