<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmeldung</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://bmwfan.github.io/outlook-addins/newsletter-manager/msal-browser.min.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; color: #444; max-width: 320px; padding: 16px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #ddd;
               border-top-color: #6B52E8; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="msg">Anmeldung läuft…</p>
  </div>
  <script>
    const SCOPES = ['Mail.ReadWrite', 'MailboxSettings.ReadWrite'];

    // Start MSAL immediately so the auth-code hash is captured before anything cleans it up.
    const msalApp = new msal.PublicClientApplication({
      auth: {
        clientId:    '0ad0c612-487d-4285-82b4-132de22f7642',
        authority:   'https://login.microsoftonline.com/common',
        redirectUri: 'https://bmwfan.github.io/outlook-addins/newsletter-manager/auth.html'
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
    });
    const redirectPromise = msalApp.handleRedirectPromise();

    function send(payload) {
      Office.context.ui.messageParent(JSON.stringify(payload));
    }

    // Wait for Office to be ready before calling messageParent.
    Office.onReady(async function() {
      try {
        // Case 1: coming back from Microsoft redirect with auth code
        const response = await redirectPromise;
        if (response && response.accessToken) {
          send({ status: 'success', token: response.accessToken });
          return;
        }

        // Case 2: MSAL already has a cached account — try silent renewal (no redirect needed)
        const accounts = msalApp.getAllAccounts();
        if (accounts.length > 0) {
          try {
            const silent = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
            send({ status: 'success', token: silent.accessToken });
            return;
          } catch (_) {
            // silent failed — fall through to interactive redirect below
          }
        }

        // Case 3: first login — redirect to Microsoft
        document.getElementById('msg').textContent = 'Weiterleitung zu Microsoft…';
        await msalApp.loginRedirect({ scopes: SCOPES });
      } catch (e) {
        document.getElementById('msg').textContent = 'Fehler: ' + e.message;
        try { send({ status: 'error', message: e.message }); } catch (_) {}
      }
    });
  </script>
</body>
</html>
